# =============================================================================
# NocoDB Backup Workflow
# =============================================================================
# Runs the backup script on a weekly schedule and commits the resulting ZIP
# archive(s) into the `backups/` directory.
#
# Required secrets (configure in GitHub repo → Settings → Secrets → Actions):
#   NOCODB_URL       – NocoDB server URL (e.g. https://nocodb.5tritti.de)
#   NOCODB_TOKEN     – NocoDB API xc-token
#   NOCODB_BASE_ID   – NocoDB base ID (e.g. pzceta1esnysj0x)
# =============================================================================
name: NocoDB Backup

on:
  schedule:
    # Every Sunday at 04:00 UTC
    - cron: "0 4 * * 0"
  workflow_dispatch:
    # Allow manual trigger from the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (jq, curl, zip)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl zip

      - name: Run NocoDB Backup
        run: |
          bash scripts/nocodb-backup.sh
        env:
          NOCODB_URL:     ${{ secrets.NOCODB_URL }}
          NOCODB_TOKEN:   ${{ secrets.NOCODB_TOKEN }}
          NOCODB_BASE_ID: ${{ secrets.NOCODB_BASE_ID }}
          BACKUP_DIR:     ./backups

      - name: Commit and push backup archive
        shell: bash
        run: |
          # Check if there are any changes worth committing
          if [[ -z "$(git status --porcelain -- backups/)" ]]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git commit -m "chore(backup): NocoDB backup $(date -u +'%Y-%m-%d')"
          git pull --rebase
          git push
