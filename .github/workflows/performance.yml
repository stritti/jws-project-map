name: Performance Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  performance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (with bundle budget)
        run: npm run build:prod

      - name: Run Lighthouse CI (static dist)
        run: npx lhci autorun --collect.staticDistDir=dist --upload.target=temporary-public-storage
